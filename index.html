<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Secret Engine</title>
    <style>
        body {
            background-color: #050505; color: white;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #game-frame {
            width: 350px; height: 400px;
            background: #000; border: 4px solid #ffd700; border-radius: 35px;
            position: relative; overflow: hidden;
        }

        #multiplier {
            font-size: 50px; font-weight: 900; color: #ffd700;
            text-align: center; width: 100%; margin-top: 60px;
        }

        #airplane {
            font-size: 70px; position: absolute;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10;
        }

        #ui-panel {
            background: #111; width: 350px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            border-radius: 0 0 30px 30px;
        }

        .display-box {
            background: #000; border: 1px solid #333;
            width: 90%; padding: 10px; border-radius: 12px; text-align: center;
        }

        .label { font-size: 10px; color: #ffd700; font-weight: bold; }
        .value { font-size: 22px; color: #fff; font-weight: bold; }

        #main-btn {
            background: #ffd700; color: #000; border: none;
            width: 95%; padding: 20px; font-size: 24px; font-weight: 900;
            border-radius: 15px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-frame">
        <div id="multiplier">0.00 G</div>
        <div id="airplane">✈️</div>
    </div>

    <div id="ui-panel">
        <div class="display-box">
            <div class="label">REKÒMPANS</div>
            <div id="txtGenyen" class="value">0.00 G</div>
        </div>
        <button id="main-btn" onclick="handleBtn()">JWE (5G)</button>
    </div>

    <script>
        // MEMWA SEKRE (JWÈ A PA WÈ SA)
        let totalPeyeEntèn = 0;
        let totalGenyenEntèn = 0;
        
        let santimCounter = 0;
        let isRunning = false;
        let crashPoint = 0;
        let loop;
        
        const MILION = 1000000; 

        const btn = document.getElementById('main-btn');
        const countDisp = document.getElementById('multiplier');
        const genyenDisp = document.getElementById('txtGenyen');
        const airplane = document.getElementById('airplane');

        function handleBtn() {
            if (!isRunning) {
                startFlight();
            } else {
                cashOut();
            }
        }

        function startFlight() {
            // Netwaye ekran an nèt
            isRunning = true;
            santimCounter = 0;
            countDisp.innerText = "0.00 G";
            countDisp.style.color = "#ffd700";
            genyenDisp.innerText = "0.00 G";
            airplane.innerText = "✈️";

            // Kalkile pèt jeneral an kachèt
            totalPeyeEntèn += 5;
            let balans = totalGenyenEntèn - totalPeyeEntèn;

            // LOJIK ENTÈLIJAN POU "CRASH"
            if (balans <= -500) {
                // Si l pèdi anpil, ba l yon gwo vòl ant 50.00 G ak 99.00 G
                crashPoint = Math.floor((Math.random() * 49000000) + 50000000);
            } else {
                // Lojik nòmal, li pété ant 1.00 G ak 30.00 G
                crashPoint = Math.floor((Math.random() * 29000000) + 1000000);
            }

            btn.innerText = "REKIPERE";
            btn.style.background = "red";
            btn.style.color = "white";

            loop = setInterval(() => {
                // Ogmante santim yo rapidman
                santimCounter += Math.floor(Math.random() * 150000) + 50000;
                
                // Konvèti 1,000,000 santim an 1.00 Goud
                let conversion = (santimCounter / MILION).toFixed(2);
                countDisp.innerText = conversion + " G";

                if (santimCounter >= crashPoint) {
                    boom();
                }
            }, 80);
        }

        function boom() {
            clearInterval(loop);
            isRunning = false;
            countDisp.innerText = "BOOM! 💥";
            countDisp.style.color = "red";
            airplane.innerText = "🔥";
            
            setTimeout(resetButtons, 1500);
        }

        function cashOut() {
            clearInterval(loop);
            isRunning = false;
            
            let won = Math.floor(santimCounter / MILION);
            totalGenyenEntèn += won; // Sove nan memwa sekre
            
            genyenDisp.innerText = (santimCounter / MILION).toFixed(2) + " G";
            countDisp.style.color = "#00ff00";
            
            setTimeout(resetButtons, 1500);
        }

        function resetButtons() {
            btn.innerText = "JWE (5G)";
            btn.style.background = "#ffd700";
            btn.style.color = "#000";
            isRunning = false;
        }
    </script>
</body>
</html>

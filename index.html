<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack War Booster</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: white; text-align: center; 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }

        /* --- GAME BOX --- */
        #game-box {
            width: 350px; height: 400px; 
            background: radial-gradient(circle, #111, #000);
            border: 2px solid #555; border-radius: 40px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.2);
        }

        #santim-raw { font-size: 50px; font-weight: 900; color: #ff3300; margin-top: 40px; text-shadow: 0 0 15px #ff3300; z-index: 10; position: relative; }
        #goud-converted { font-size: 18px; color: #fff; opacity: 0.6; z-index: 10; position: relative; }

        /* --- WAR AIRPLANE ANIMATION --- */
        #airplane-container {
            position: absolute; 
            bottom: -100px; /* Kòmanse anba nèt pou l soti */
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 5;
        }

        #airplane {
            font-size: 70px;
            display: inline-block;
            transform: rotate(-45deg); /* Pozisyon avyon de gè */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        /* GWO DIFÈ KI SOTI DÈYÈ */
        .thruster-fire {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 0px; /* Kòmanse nan 0 */
            background: linear-gradient(to bottom, #ff0000, #ff8c00, #ffff00, transparent);
            filter: blur(8px);
            border-radius: 0 0 50px 50px;
            opacity: 0;
            transition: height 0.5s, opacity 0.3s;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scaleX(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scaleX(1.2); opacity: 1; }
        }

        /* NUAJ KAP DEFILE */
        .cloud {
            position: absolute; background: rgba(255,255,255,0.1);
            filter: blur(20px); border-radius: 50%; width: 100px; height: 40px;
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translateY(-100px); }
            to { transform: translateY(500px); }
        }

        /* --- UI PANEL --- */
        #ui-panel { width: 350px; margin-top: 20px; z-index: 20; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .field { background: #111; border: 1px solid #333; padding: 12px; border-radius: 20px; text-align: left; }
        label { font-size: 10px; color: #ff3300; text-transform: uppercase; display: block; font-weight: bold; }
        .edittext { font-size: 24px; font-weight: bold; color: #fff; background: none; border: none; width: 100%; outline: none; }

        #draw-btn {
            width: 100%; background: linear-gradient(180deg, #ff3300, #990000); color: #fff;
            border: none; padding: 20px; border-radius: 50px; font-weight: 900;
            font-size: 20px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(255, 51, 0, 0.4);
        }

        /* MODAL */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-card {
            width: 85%; background: #111; border: 2px solid #ff3300;
            border-radius: 25px; padding: 25px; text-align: center;
        }
        .btn-m { padding: 15px; width: 100px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="santim-raw">0</div>
    <div id="goud-converted">0.00 GOUD</div>

    <div id="airplane-container">
        <div id="airplane">✈️</div>
        <div class="thruster-fire" id="main-fire"></div>
    </div>
</div>

<div id="ui-panel">
    <div class="grid-2">
        <div class="field">
            <label>Peye</label>
            <input type="text" id="edittextpeye" value="0" readonly class="edittext">
        </div>
        <div class="field">
            <label>Genyen</label>
            <input type="text" id="edittextgenyen" value="0" readonly class="edittext" style="color: #ffcc00;">
        </div>
    </div>
    <button id="draw-btn">DEMARE AVYON</button>
</div>

<div id="modal">
    <div class="modal-card" id="modal-content"></div>
</div>

<script>
    const airplaneCont = document.getElementById("airplane-container");
    const mainFire = document.getElementById("main-fire");
    const santimDisplay = document.getElementById("santim-raw");
    const drawBtn = document.getElementById("draw-btn");
    const inputPeye = document.getElementById("edittextpeye");
    const inputGenyen = document.getElementById("edittextgenyen");
    const modal = document.getElementById("modal");

    let santimCounter = 0;
    let isRunning = false;
    let loop;
    let lastWin = false;
    let consecutiveLosses = 0;
    const MILION = 1000000;

    function sendToSketchware(bwat, val) {
        if (window.Android && window.Android.voyeKòb) {
            window.Android.voyeKòb(bwat, val.toString());
        }
    }

    drawBtn.onclick = () => {
        if (isRunning) { cashOut(); return; }
        
        modal.style.display = "flex";
        document.getElementById('modal-content').innerHTML = `
            <h2 style="color:#ff3300">MISYON KONBA</h2>
            <p style="color:#fff">Mize 5 GOUD pou demare avyon an.</p>
            <button class="btn-m" style="background:#333; color:#fff" onclick="modal.style.display='none'">NON</button>
            <button class="btn-m" style="background:#ff3300; color:#fff" onclick="confirmStart()">WI, ATACK!</button>
        `;
    };

    function confirmStart() {
        modal.style.display = "none";
        isRunning = true;
        santimCounter = 0;
        
        inputPeye.value = "5";
        sendToSketchware("peye", "5");
        inputGenyen.value = "0";
        sendToSketchware("genyen", "0");

        // 1. AVYON AN SOTI ANBA MONTE NAN MITAN
        airplaneCont.style.transition = "bottom 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67)";
        airplaneCont.style.bottom = "150px"; 

        // 2. LÈ L RIVE NAN MITAN (Apre 1.5s), LI KANPE EPI L BAY DIFÈ
        setTimeout(() => {
            if(!isRunning) return;
            mainFire.style.opacity = "1";
            mainFire.style.height = "180px"; // Gwo dife long
            
            // Kòmanse konte kòb la sèlman lè l fin poze nan mitan
            loop = setInterval(() => {
                santimCounter += Math.floor(Math.random() * 95000) + 35000;
                santimDisplay.innerText = santimCounter.toLocaleString();
                document.getElementById("goud-converted").innerText = (santimCounter/MILION).toFixed(2) + " GOUD";

                if (santimCounter >= crashLimit) crash();
            }, 80);
        }, 1500);

        // Lojik Booster
        if (lastWin) crashLimit = Math.floor((Math.random() * 0.6 + 0.2) * MILION);
        else if (consecutiveLosses >= 5) crashLimit = Math.floor((Math.random() * 4 + 6) * MILION);
        else crashLimit = Math.floor((Math.random() * 1.5 + 1.2) * MILION);

        drawBtn.innerText = "REKIPERE KÒB";
        drawBtn.style.background = "#444";
    }

    function crash() {
        clearInterval(loop);
        isRunning = false;
        lastWin = false;
        consecutiveLosses++;
        
        mainFire.style.height = "0px";
        mainFire.style.opacity = "0";
        santimDisplay.innerText = "EXPLOSION! 💥";
        document.getElementById("airplane").innerText = "🔥";
        
        airplaneCont.style.transition = "bottom 0.5s ease-in";
        airplaneCont.style.bottom = "-100px"; // Li disparèt anba lè l pété
        
        sendToSketchware("genyen", "0");
        setTimeout(resetGame, 2000);
    }

    function cashOut() {
        clearInterval(loop);
        isRunning = false;
        let won = Math.floor(santimCounter / MILION);
        
        if (won > 0) {
            lastWin = true; consecutiveLosses = 0;
            inputGenyen.value = won.toString();
            sendToSketchware("genyen", won.toString());
        }
        
        mainFire.style.height = "0px";
        airplaneCont.style.transition = "bottom 0.8s ease-in";
        airplaneCont.style.bottom = "500px"; // Li vole pati anlè lè ou kach out
        
        setTimeout(resetGame, 1500);
    }

    function resetGame() {
        clearInterval(loop);
        airplaneCont.style.transition = "none";
        airplaneCont.style.bottom = "-100px";
        document.getElementById("airplane").innerText = "✈️";
        drawBtn.innerText = "DEMARE AVYON";
        drawBtn.style.background = "linear-gradient(180deg, #ff3300, #990000)";
        isRunning = false;
        mainFire.style.height = "0px";
        mainFire.style.opacity = "0";
    }
</script>
</body>
</html>

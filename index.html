<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Booster Pro</title>
    <style>
        body { 
            background: #000; color: white; text-align: center; 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
        }

        /* --- STYLE DIALOGUE --- */
        #custom-dialogue {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid #ffd700; border-radius: 20px;
            padding: 20px; width: 280px; z-index: 1000; display: none;
        }
        #dialogue-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 999; display: none;
        }
        .diag-btn { padding: 12px 25px; margin: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-wi { background: #ffd700; color: #000; }
        .btn-non { background: #444; color: #fff; }

        /* --- GAME INTERFACE --- */
        #game-box {
            width: 340px; height: 380px; background: #050505;
            border: 3px solid #ffd700; border-radius: 35px;
            position: relative; overflow: hidden;
        }

        #santim-raw { font-size: 45px; font-weight: 900; color: #ffd700; margin-top: 50px; }
        #goud-converted { font-size: 18px; color: #fff; opacity: 0.7; }
        #airplane { font-size: 60px; position: absolute; bottom: 40px; left: 40%; }

        /* --- STATS PANEL --- */
        #ui-panel { width: 340px; margin-top: 20px; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .box { background: #111; border: 1px solid #ffd700; padding: 12px; border-radius: 15px; width: 44%; }
        .label { font-size: 10px; color: #ffd700; font-weight: bold; }
        .edittext { font-size: 26px; font-weight: bold; color: #00ff00; }

        #main-btn {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border: none; padding: 18px; width: 100%; font-size: 22px;
            font-weight: bold; border-radius: 50px; cursor: pointer; color: #000;
        }
    </style>
</head>
<body>

    <div id="dialogue-overlay"></div>
    <div id="custom-dialogue">
        <h3 style="color:#ffd700; margin-top:0;">MIZE 5 GOUD</h3>
        <p id="diag-msg">Eske ou vle kòmanse vòl sa a pou 5 Goud?</p>
        <div id="diag-actions">
            <button class="diag-btn btn-wi" id="confirm-btn">WI</button>
            <button class="diag-btn btn-non" onclick="closeDialogue()">NON</button>
        </div>
    </div>

    <div id="game-box">
        <div id="santim-raw">0</div>
        <div id="goud-converted">0.00 GOUD</div>
        <div id="airplane">✈️</div>
    </div>

    <div id="ui-panel">
        <div class="stats-row">
            <div class="box">
                <div class="label">EDT_PEYE</div>
                <div id="edittextPeye" class="edittext">0</div>
            </div>
            <div class="box">
                <div class="label">EDT_GENYEN</div>
                <div id="edittextGenyen" class="edittext">0</div>
            </div>
        </div>
        <button id="main-btn" onclick="handleInput()">JWE KADASTRAL</button>
    </div>

    <script>
        let santim = 0, isRunning = false, loop, crashLimit = 0;
        const MILION = 1000000;

        // Nou sipoze itilizatè a gen yon balans nan Sketchware
        let balansAktif = 100; 

        function closeDialogue() {
            document.getElementById('dialogue-overlay').style.display = 'none';
            document.getElementById('custom-dialogue').style.display = 'none';
        }

        function handleInput() {
            if (!isRunning) {
                document.getElementById('dialogue-overlay').style.display = 'block';
                document.getElementById('custom-dialogue').style.display = 'block';
                document.getElementById('confirm-btn').onclick = startFlight;
            } else {
                cashOut();
            }
        }

        function startFlight() {
            closeDialogue();
            isRunning = true;
            santim = 0;
            
            // 1. Set edittextPeye a 5 lè l kòmanse
            document.getElementById('edittextPeye').innerText = "5";
            document.getElementById('edittextGenyen').innerText = "0"; // Reset ganyen an pou vòl sa

            // Lojik Booster (Crash ant 1.20G ak 15.00G pa azar)
            crashLimit = Math.floor((Math.random() * 14 + 1.2) * MILION);

            document.getElementById('main-btn').innerText = "REKIPERE KÒB";
            document.getElementById('main-btn').style.background = "red";
            document.getElementById('airplane').innerText = "✈️";

            loop = setInterval(() => {
                santim += Math.floor(Math.random() * 90000) + 40000;
                document.getElementById('santim-raw').innerText = santim.toLocaleString();
                document.getElementById('goud-converted').innerText = (santim/MILION).toFixed(2) + " GOUD";

                if (santim >= crashLimit) crash();
            }, 80);
        }

        function crash() {
            clearInterval(loop);
            isRunning = false;
            document.getElementById('santim-raw').innerText = "CRASH! 💥";
            document.getElementById('airplane').innerText = "🔥";
            // Lè l pèdi, li pa genyen anyen
            document.getElementById('edittextGenyen').innerText = "0";
            setTimeout(resetUI, 2000);
        }

        function cashOut() {
            clearInterval(loop);
            isRunning = false;
            
            // 2. Set edittextGenyen ak valè li genyen an (chif won)
            let won = Math.floor(santim / MILION);
            document.getElementById('edittextGenyen').innerText = won;
            
            document.getElementById('santim-raw').style.color = "#00ff00";
            setTimeout(resetUI, 1500);
        }

        function resetUI() {
            document.getElementById('main-btn').innerText = "JWE KADASTRAL";
            document.getElementById('main-btn').style.background = "linear-gradient(180deg, #ffd700, #ff8c00)";
            document.getElementById('santim-raw').style.color = "#ffd700";
            document.getElementById('airplane').innerText = "✈️";
            isRunning = false;
        }
    </script>
</body>
</html>

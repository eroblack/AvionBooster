<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Pro Flight - No Decimals</title>
    <style>
        body {
            background-color: #050505; color: white;
            font-family: 'Trebuchet MS', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #game-box {
            width: 360px; height: 550px;
            background: linear-gradient(to bottom, #111, #222);
            border: 3px solid #ffd700; border-radius: 40px;
            position: relative; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex; flex-direction: column; align-items: center;
        }

        #sky {
            width: 100%; height: 300px;
            background: #000814; position: relative;
            overflow: hidden; border-radius: 35px 35px 0 0;
        }

        #multiplier-display {
            position: absolute; top: 50px; width: 100%; text-align: center; z-index: 20;
        }

        #santim-raw {
            font-size: 40px; font-weight: 900; color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        #goud-converted {
            font-size: 16px; color: #fff; background: rgba(0,0,0,0.7);
            padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 5px;
        }

        #airplane {
            font-size: 50px; position: absolute;
            bottom: 40px; left: calc(50% - 25px); z-index: 10;
        }

        #wallet-container { margin-top: 20px; text-align: center; }
        
        .edittext-pro {
            background: #000; border: 2px solid #ffd700; color: #00ff00;
            font-size: 28px; font-weight: bold; text-align: center;
            padding: 10px; border-radius: 15px; width: 220px; margin-bottom: 15px;
        }

        #main-btn {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border: none; padding: 18px 50px; font-size: 22px;
            font-weight: bold; border-radius: 50px; cursor: pointer; color: #000;
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="sky">
            <div id="multiplier-display">
                <div id="santim-raw">0</div>
                <div id="goud-converted">0.00 GOUD</div>
            </div>
            <div id="airplane">✈️</div>
        </div>

        <div id="wallet-container">
            <div style="font-size: 11px; margin-bottom: 5px; color: #ffd700;">OU GENYEN</div>
            <input type="text" id="edittextGenyen" class="edittext-pro" value="0" readonly>
            <br>
            <button id="main-btn" onclick="handleButtonClick()">JWE (5 GOUD)</button>
        </div>
    </div>

    <script>
        let internalPeye = 0;
        let internalGenyen = 0;
        let santimCounter = 0;
        let gameRunning = false;
        let crashLimit = 0;
        let flightInterval;
        const MILION = 1000000; 

        const santimDisplay = document.getElementById('santim-raw');
        const goudDisplay = document.getElementById('goud-converted');
        const mainBtn = document.getElementById('main-btn');
        const edittextGenyen = document.getElementById('edittextGenyen');
        const airplane = document.getElementById('airplane');

        function handleButtonClick() {
            if (!gameRunning) startFlight();
            else cashOut();
        }

        function startFlight() {
            gameRunning = true;
            santimCounter = 0;
            
            // UI Reset
            santimDisplay.innerText = "0";
            santimDisplay.style.color = "#ffd700";
            goudDisplay.innerText = "0.00 GOUD";
            edittextGenyen.value = "0"; // Retire desimal la
            airplane.innerText = "✈️";

            internalPeye += 5;
            let balansSistèm = internalPeye - internalGenyen;

            // --- LOJIK SERE (KONTWÒL GANYEN) ---
            if (balansSistèm < 0) {
                // Jwè a ap genyen twòp, pété l ant 0.20 G ak 0.90 G
                crashLimit = Math.floor((Math.random() * 0.7 + 0.2) * MILION);
            } else if (balansSistèm < 100) {
                // Nòmal: pété ant 1 G ak 6 G
                crashLimit = Math.floor((Math.random() * 5 + 1) * MILION);
            } else {
                // Si l pèdi anpil (plis pase 300), ba l vòl ant 10 G ak 40 G
                crashLimit = Math.floor((Math.random() * 30 + 10) * MILION);
            }

            mainBtn.innerText = "REKIPERE!";
            mainBtn.style.background = "red";
            mainBtn.style.color = "white";

            flightInterval = setInterval(() => {
                let inc = Math.floor(Math.random() * 60000) + 30000;
                santimCounter += inc;
                
                santimDisplay.innerText = santimCounter.toLocaleString();
                goudDisplay.innerText = (santimCounter / MILION).toFixed(2) + " GOUD";

                if (santimCounter >= crashLimit) crash();
            }, 80);
        }

        function crash() {
            clearInterval(flightInterval);
            gameRunning = false;
            santimDisplay.style.color = "#ff4d4d";
            santimDisplay.innerText = "BOOM! 💥";
            airplane.innerText = "🔥";
            setTimeout(resetUI, 1800);
        }

        function cashOut() {
            clearInterval(flightInterval);
            gameRunning = false;
            
            // Chif won sèlman nan bwat la
            let wonVal = Math.floor(santimCounter / MILION);
            internalGenyen += wonVal;
            
            edittextGenyen.value = wonVal; // Montre chif won an (ex: 5 oswa 10)
            santimDisplay.style.color = "#00ff00";
            setTimeout(resetUI, 1500);
        }

        function resetUI() {
            mainBtn.innerText = "JWE (5 GOUD)";
            mainBtn.style.background = "linear-gradient(180deg, #ffd700, #ff8c00)";
            mainBtn.style.color = "black";
            airplane.innerText = "✈️";
            gameRunning = false;
        }
    </script>
</body>
</html>

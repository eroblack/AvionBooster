<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Pro Flight - Master Logic</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Trebuchet MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-box {
            width: 360px;
            height: 550px;
            background: linear-gradient(to bottom, #111, #222);
            border: 3px solid #ffd700;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #sky {
            width: 100%;
            height: 300px;
            background: #000814;
            position: relative;
            overflow: hidden;
            border-radius: 35px 35px 0 0;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            animation: moveClouds linear infinite;
        }

        @keyframes moveClouds {
            from { transform: translateY(-50px); }
            to { transform: translateY(350px); }
        }

        #airplane {
            font-size: 50px;
            position: absolute;
            bottom: 40px;
            left: calc(50% - 25px);
            z-index: 10;
        }

        #multiplier-display {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            font-size: 45px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        #sub-info { font-size: 14px; color: #aaa; }

        #wallet-container { margin-top: 20px; text-align: center; }
        
        .edittext-pro {
            background: #000;
            border: 2px solid #ffd700;
            color: #00ff00;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 15px;
            width: 220px;
            margin-bottom: 15px;
        }

        #main-btn {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: #000;
            transition: 0.2s;
        }

        #main-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="sky">
            <div id="multiplier-display">0.00 <div id="sub-info">GOUD</div></div>
            <div id="airplane">✈️</div>
        </div>

        <div id="wallet-container">
            <div style="font-size: 12px; margin-bottom: 5px; color: #ffd700;">OU GENYEN</div>
            <input type="text" id="edittextGenyen" class="edittext-pro" value="0.00 G" readonly>
            <br>
            <button id="main-btn" onclick="handleButtonClick()">JWE (5 GOUD)</button>
        </div>
    </div>

    <script>
        // --- LOJIK SEKRE (JWÈ A PA WÈ SA) ---
        let internalPeye = 0;
        let internalGenyen = 0;
        
        let santimCounter = 0;
        let gameRunning = false;
        let crashLimit = 0;
        let flightInterval;
        
        const MILION = 1000000; // 1 Milyon santim = 1 Goud

        const multiplierDisplay = document.getElementById('multiplier-display');
        const mainBtn = document.getElementById('main-btn');
        const edittextGenyen = document.getElementById('edittextGenyen');
        const airplane = document.getElementById('airplane');
        const sky = document.getElementById('sky');

        function handleButtonClick() {
            if (!gameRunning) {
                startFlight();
            } else {
                cashOut();
            }
        }

        function startFlight() {
            // 1. Reset Ekran (Netwaye sifas la)
            gameRunning = true;
            santimCounter = 0;
            multiplierDisplay.innerHTML = '0.00 <div id="sub-info">GOUD</div>';
            multiplierDisplay.style.color = "#ffd700";
            edittextGenyen.value = "0.00 G";
            airplane.innerText = "✈️";

            // 2. Kontwòl Entèn (Pran 5 goud la an kachèt)
            internalPeye += 5;
            let balansSekre = internalGenyen - internalPeye;

            // 3. Entèlijans pou "Crash"
            if (balansSekre <= -500) {
                // Si l pèdi anpil, ba l yon "Mega Rabè" ant 150g ak 400g
                crashLimit = Math.floor((Math.random() * 250 + 150) * MILION);
            } else if (balansSekre <= -200) {
                // Rabè mwayen ant 50g ak 100g
                crashLimit = Math.floor((Math.random() * 50 + 50) * MILION);
            } else {
                // Lojik nòmal, p'ap janm pété anba 2.00 Goud pou l pa dekourage
                crashLimit = Math.floor((Math.random() * 30 + 2) * MILION);
            }

            mainBtn.innerText = "REKIPERE!";
            mainBtn.style.background = "red";
            mainBtn.style.color = "white";

            flightInterval = setInterval(() => {
                // 4. Kalkil 1 Milyon = 1 Goud
                // Nou fè l monte rapid
                santimCounter += Math.floor(Math.random() * 120000) + 40000;
                
                let goudDisplay = (santimCounter / MILION).toFixed(2);
                multiplierDisplay.innerHTML = goudDisplay + '<div id="sub-info">GOUD</div>';

                if(Math.random() > 0.8) createCloud();

                if (santimCounter >= crashLimit) {
                    crash();
                }
            }, 70);
        }

        function crash() {
            clearInterval(flightInterval);
            gameRunning = false;
            
            multiplierDisplay.style.color = "#ff4d4d";
            multiplierDisplay.innerHTML = "BOOM! 💥";
            airplane.innerText = "🔥";

            setTimeout(() => {
                resetUI();
            }, 2000);
        }

        function cashOut() {
            clearInterval(flightInterval);
            gameRunning = false;
            
            let won = (santimCounter / MILION).toFixed(2);
            let wonInt = Math.floor(santimCounter / MILION);
            
            // Sove genyen an nan memwa entèn la
            internalGenyen += wonInt;
            
            edittextGenyen.value = won + " G";
            multiplierDisplay.style.color = "#00ff00";

            setTimeout(() => {
                resetUI();
            }, 1500);
        }

        function resetUI() {
            mainBtn.innerText = "JWE (5 GOUD)";
            mainBtn.style.background = "linear-gradient(180deg, #ffd700, #ff8c00)";
            mainBtn.style.color = "black";
            airplane.innerText = "✈️";
            gameRunning = false;
        }

        function createCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = (Math.random() * 60 + 20) + 'px';
            c.style.height = '15px';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '-20px';
            c.style.animationDuration = '1.8s';
            sky.appendChild(c);
            setTimeout(() => c.remove(), 2000);
        }
    </script>
</body>
</html>

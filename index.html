<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Sky Booster</title>
    <style>
        body {
            background-color: #0b0d17;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Background Anime ak nwaj */
        #game-screen {
            width: 350px;
            height: 500px;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .cloud {
            position: absolute;
            width: 100px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            animation: moveClouds linear infinite;
        }

        @keyframes moveClouds {
            from { top: -50px; }
            to { top: 550px; }
        }

        /* Avyon ak Kontè */
        #airplane {
            font-size: 60px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            transition: bottom 0.1s ease-out;
        }

        #counter-container {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        #counter {
            font-size: 35px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* Interface anba a */
        #controls {
            margin-top: 20px;
            text-align: center;
        }

        .edit-text {
            background: #222;
            color: #00ff00;
            border: 2px solid #ffd700;
            padding: 10px;
            border-radius: 10px;
            font-size: 20px;
            width: 200px;
            text-align: center;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(145deg, #ffd700, #b8860b);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Pop-up Dialogue */
        #dialogue-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            display: none;
            width: 250px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #dialogue-box button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="counter-container">
            <div id="counter">0</div>
            <div style="font-size: 14px;">SANTIM</div>
        </div>
        
        <div id="airplane">✈️</div>

        <div id="dialogue-box">
            <h3>MISE KONFIME</h3>
            <p>Mise la se 5 Goud. Èske ou vle jwe?</p>
            <button onclick="confirmBet()" style="background: #28a745; color: white;">WI</button>
            <button onclick="closeDialog()" style="background: #dc3545; color: white;">NON</button>
        </div>
    </div>

    <div id="controls">
        <div style="font-size: 14px; margin-bottom: 5px;">BALANS (GOURDES)</div>
        <input type="text" id="edittextGenyen" class="edit-text" value="0" readonly>
        <br>
        <button id="main-btn" onclick="showBetDialog()">KÒMANSE VOL LA</button>
    </div>

    <script>
        let counterValue = 0;
        let gameActive = false;
        let crashPoint = 0;
        let interval;
        let totalGourdes = 0;
        const MILION = 1000000;

        const counterDisplay = document.getElementById('counter');
        const mainBtn = document.getElementById('main-btn');
        const airplane = document.getElementById('airplane');
        const edittextGenyen = document.getElementById('edittextGenyen');
        const dialog = document.getElementById('dialogue-box');
        const gameScreen = document.getElementById('game-screen');

        // Kreye nwaj yo pa azar
        function createCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.left = Math.random() * 250 + 'px';
            cloud.style.animationDuration = (Math.random() * 2 + 2) + 's';
            gameScreen.appendChild(cloud);
            setTimeout(() => { cloud.remove(); }, 4000);
        }

        function showBetDialog() {
            if (!gameActive) {
                dialog.style.display = 'block';
            } else {
                cashOut();
            }
        }

        function closeDialog() {
            dialog.style.display = 'none';
        }

        function confirmBet() {
            closeDialog();
            startGame();
        }

        function startGame() {
            gameActive = true;
            counterValue = 0;
            crashPoint = Math.floor(Math.random() * 3000000) + 100000; // Ka rive jiska 3 milyon
            
            mainBtn.innerText = "REKIPERE KASE";
            mainBtn.style.background = "linear-gradient(145deg, #ff4d4d, #b30000)";
            
            interval = setInterval(() => {
                counterValue += Math.floor(Math.random() * 15000) + 5000;
                counterDisplay.innerText = counterValue.toLocaleString();

                // Animasyon avyon an k ap monte yon ti jan
                let altitude = 50 + (counterValue / 10000);
                if (altitude < 400) airplane.style.bottom = altitude + "px";

                createCloud();

                if (counterValue >= crashPoint) {
                    crashGame();
                }
            }, 80);
        }

        function crashGame() {
            clearInterval(interval);
            gameActive = false;
            counterDisplay.style.color = "red";
            counterDisplay.innerText = "BOOM! 💥";
            airplane.innerText = "🔥";
            
            setTimeout(() => {
                airplane.innerText = "✈️";
                airplane.style.bottom = "50px";
                resetUI();
            }, 2000);
        }

        function cashOut() {
            clearInterval(interval);
            gameActive = false;
            
            // Kalkil: Chak 1,000,000 = 1 Gourde
            let wonAmount = Math.floor(counterValue / MILION);
            totalGourdes += wonAmount;
            
            edittextGenyen.value = totalGourdes;
            resetUI();
        }

        function resetUI() {
            mainBtn.innerText = "KÒMANSE VOL LA";
            mainBtn.style.background = "linear-gradient(145deg, #ffd700, #b8860b)";
            counterDisplay.style.color = "#ffd700";
        }
    </script>
</body>
</html>

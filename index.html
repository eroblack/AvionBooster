<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Engine Pro</title>
    <style>
        body {
            background-color: #050505; color: white;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #game-frame {
            width: 350px; height: 500px;
            background: #000; border: 4px solid #ffd700; border-radius: 35px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        #multiplier {
            font-size: 50px; font-weight: 900; color: #ffd700;
            text-align: center; width: 100%; margin-top: 50px;
        }

        #airplane {
            font-size: 70px; position: absolute;
            bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 10;
        }

        #ui-panel {
            background: #111; width: 100%; padding: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .display-box {
            background: #000; border: 2px solid #ffd700;
            width: 85%; padding: 10px; border-radius: 15px; text-align: center;
        }

        .label { font-size: 11px; color: #ffd700; font-weight: bold; }
        .value { font-size: 26px; color: #fff; font-weight: bold; }

        #main-btn {
            background: #ffd700; color: #000; border: none;
            width: 90%; padding: 20px; font-size: 24px; font-weight: 900;
            border-radius: 50px; cursor: pointer;
        }

        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.1);
            height: 10px; border-radius: 10px; animation: flow linear infinite;
        }
        @keyframes flow { from { top: -20px; } to { top: 350px; } }
    </style>
</head>
<body>

    <div id="game-frame">
        <div id="multiplier">0.00</div>
        <div id="airplane">✈️</div>
    </div>

    <div id="ui-panel">
        <div class="display-box">
            <div class="label">MIZ AKTUAL</div>
            <div class="value">5 GOUD</div>
        </div>
        <div class="display-box">
            <div class="label">OU GENYEN</div>
            <div id="txtGenyen" class="value">0.00 G</div>
        </div>
        <button id="main-btn" onclick="handleBtn()">JWE</button>
    </div>

    <script>
        // --- LOGIQUE INTERNE (CACHE) ---
        let internalPeye = 0;
        let internalGenyen = 0;
        let santimTotal = 0;
        let isRunning = false;
        let crashPoint = 0;
        let flightInterval;
        
        const MILION = 1000000; // 1,000,000 santim = 1 Goud
        const MAX_LIMIT = 100 * MILION; // Limit 100 Goud

        const btn = document.getElementById('main-btn');
        const countDisplay = document.getElementById('multiplier');
        const genyenDisplay = document.getElementById('txtGenyen');
        const airplane = document.getElementById('airplane');

        function handleBtn() {
            if (!isRunning) startNewGame();
            else cashOut();
        }

        function startNewGame() {
            // Reset vizyèl
            countDisplay.innerText = "0.00";
            countDisplay.style.color = "#ffd700";
            genyenDisplay.innerText = "0.00 G";
            airplane.innerText = "✈️";
            
            // Kontwòl an kachèt
            internalPeye += 5;
            santimTotal = 0;
            isRunning = true;

            // --- INTELLIGENCE DE CONTRÔLE ---
            let balance = internalGenyen - internalPeye;
            
            if (balance <= -250) {
                // Si l pèdi plis pase 250 Goud, ba li yon "Mega Rabè"
                // Avyon an ap moute ant 50g rive 99g
                crashPoint = Math.floor((Math.random() * 49 + 50) * MILION);
            } else {
                // Lojik nòmal men ki ba li anpil chans
                // Avyon an p'ap janm pété anba 2 Goud pou l pa dekourage
                crashPoint = Math.floor((Math.random() * 30 + 2) * MILION);
            }

            btn.innerText = "REKIPERE KÒB LA!";
            btn.style.background = "#ff4d4d";
            btn.style.color = "white";

            flightInterval = setInterval(() => {
                // Kalkil rapid pou rive nan milyon yo
                santimTotal += Math.floor(Math.random() * 45000) + 25000;
                
                let currentGoud = (santimTotal / MILION).toFixed(2);
                countDisplay.innerText = currentGoud;

                if (Math.random() > 0.8) createCloud();

                if (santimTotal >= crashPoint) crash();
            }, 50);
        }

        function crash() {
            clearInterval(flightInterval);
            isRunning = false;
            countDisplay.innerText = "BOOM! 💥";
            countDisplay.style.color = "red";
            airplane.innerText = "🔥";
            
            setTimeout(resetUI, 2000);
        }

        function cashOut() {
            clearInterval(flightInterval);
            isRunning = false;
            
            let won = Math.floor(santimTotal / MILION);
            internalGenyen += won;
            
            genyenDisplay.innerText = won.toFixed(2) + " G";
            countDisplay.style.color = "#00ff00";
            
            setTimeout(resetUI, 1500);
        }

        function resetUI() {
            btn.innerText = "JWE (5G)";
            btn.style.background = "#ffd700";
            btn.style.color = "#000";
            isRunning = false;
        }

        function createCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = '40px';
            c.style.left = Math.random() * 100 + '%';
            c.style.animationDuration = '1.5s';
            document.getElementById('game-frame').appendChild(c);
            setTimeout(() => c.remove(), 1500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Casino Engine</title>
    <style>
        body {
            background-color: #020205;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Sky View */
        #game-frame {
            width: 360px;
            height: 450px;
            background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 200% 200%;
            border-radius: 40px;
            border: 4px solid #ffd700;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
        }

        #multiplier-box {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 20;
        }

        #count { font-size: 50px; font-weight: 900; color: #fff; text-shadow: 2px 2px 10px #000; }
        #status-mode { font-size: 14px; font-weight: bold; color: #ffd700; text-transform: uppercase; }

        #airplane {
            font-size: 65px;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
        }

        .cloud {
            position: absolute;
            background: white;
            opacity: 0.3;
            border-radius: 50px;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(-50px); }
            to { transform: translateY(500px); }
        }

        /* Panel */
        #ui-panel {
            background: #111;
            padding: 20px;
            border-radius: 0 0 40px 40px;
            width: 324px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group { display: flex; justify-content: space-between; align-items: center; }
        .input-group label { font-size: 10px; color: #ffd700; font-weight: bold; }

        .edittext {
            background: #000;
            border: 1px solid #444;
            color: #00ff00;
            font-size: 20px;
            text-align: center;
            padding: 5px;
            width: 140px;
            border-radius: 8px;
        }

        #main-btn {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border: none;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
        }

        #modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; color: black;
            padding: 20px; border-radius: 15px;
            text-align: center; z-index: 100; display: none;
        }
    </style>
</head>
<body>

    <div id="game-frame">
        <div id="multiplier-box">
            <div id="status-mode">VÒL NORMAL</div>
            <div id="count">0</div>
        </div>
        <div id="airplane">✈️</div>
        
        <div id="modal">
            <h3>KONFIME MISE (5G)</h3>
            <button onclick="confirmFlight()" style="background:green; color:white; border:none; padding:10px; border-radius:5px;">WI, ALE!</button>
            <button onclick="hideModal()" style="background:red; color:white; border:none; padding:10px; border-radius:5px;">NON</button>
        </div>
    </div>

    <div id="ui-panel">
        <div class="input-group">
            <div><label>TOTAL PEYE</label><br><input type="text" id="edittextPeye" class="edittext" value="0" readonly style="color:#ff4d4d"></div>
            <div><label>TOTAL GENYEN</label><br><input type="text" id="edittextGenyen" class="edittext" value="0" readonly></div>
        </div>
        <button id="main-btn" onclick="btnAction()">KÒMANSE (5G)</button>
    </div>

    <script>
        let santim = 0;
        let gameActive = false;
        let crashPoint = 0;
        let flightLoop;
        let totalPeye = 0;
        let totalGenyen = 0;
        const GOURDE = 1000000;

        function btnAction() {
            if (!gameActive) document.getElementById('modal').style.display = 'block';
            else cashOut();
        }

        function hideModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmFlight() {
            hideModal();
            totalPeye += 5;
            document.getElementById('edittextPeye').value = totalPeye;
            startFlight();
        }

        function startFlight() {
            gameActive = true;
            santim = 0;
            let netBalance = totalGenyen - totalPeye;
            const statusLabel = document.getElementById('status-mode');

            // --- LOJIK ENTÈLIJAN ---
            if (netBalance <= -500) { 
                // Si l pèdi plis pase 500, bay chans monte rive 300-500 Goud
                statusLabel.innerText = "SUPER RECOVERY MODE 🚀";
                statusLabel.style.color = "#00ff00";
                crashPoint = Math.floor((Math.random() * 300 + 200) * GOURDE);
            } else if (netBalance <= -250) {
                // Si l pèdi ant 250 ak 500, bay chans rive 100-200 Goud
                statusLabel.innerText = "ADVANTAGE MODE ✨";
                crashPoint = Math.floor((Math.random() * 100 + 100) * GOURDE);
            } else {
                // Sinon, limit la se 100 Goud e li pété souvan anba
                statusLabel.innerText = "VÒL NORMAL";
                statusLabel.style.color = "#ffd700";
                crashPoint = Math.floor((Math.random() * 95) * GOURDE) + (0.5 * GOURDE);
            }

            document.getElementById('main-btn').innerText = "REKIPERE!";
            document.getElementById('main-btn').style.background = "red";

            flightLoop = setInterval(() => {
                santim += Math.floor(Math.random() * 20000) + 10000;
                document.getElementById('count').innerText = (santim / GOURDE).toFixed(2) + " G";
                
                if(Math.random() > 0.8) spawnCloud();
                if (santim >= crashPoint) explode();
            }, 50);
        }

        function explode() {
            clearInterval(flightLoop);
            gameActive = false;
            document.getElementById('count').innerText = "BOOM! 💥";
            document.getElementById('airplane').innerText = "🔥";
            setTimeout(reset, 2000);
        }

        function cashOut() {
            clearInterval(flightLoop);
            gameActive = false;
            let won = Math.floor(santim / GOURDE);
            totalGenyen += won;
            document.getElementById('edittextGenyen').value = totalGenyen;
            reset();
        }

        function reset() {
            document.getElementById('main-btn').innerText = "KÒMANSE (5G)";
            document.getElementById('main-btn').style.background = "linear-gradient(180deg, #ffd700, #ff8c00)";
            document.getElementById('airplane').innerText = "✈️";
            gameActive = false;
        }

        function spawnCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = '60px'; c.style.height = '20px';
            c.style.left = Math.random() * 300 + 'px';
            c.style.top = '-30px';
            c.style.animationDuration = '1.5s';
            document.getElementById('game-frame').appendChild(c);
            setTimeout(() => c.remove(), 1500);
        }
    </script>
</body>
</html>

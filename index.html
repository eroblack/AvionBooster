<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Pro Flight</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Trebuchet MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-box {
            width: 360px;
            height: 550px;
            background: linear-gradient(to bottom, #111, #222);
            border: 3px solid #ffd700;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Syèl la ak Animasyon */
        #sky {
            width: 100%;
            height: 300px;
            background: #000814;
            position: relative;
            overflow: hidden;
            border-radius: 35px 35px 0 0;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            animation: moveClouds linear infinite;
        }

        @keyframes moveClouds {
            from { transform: translateY(-50px); }
            to { transform: translateY(350px); }
        }

        #airplane {
            font-size: 50px;
            position: absolute;
            bottom: 40px;
            left: calc(50% - 25px);
            z-index: 10;
        }

        /* Kontè ak Tèks */
        #multiplier-display {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            font-size: 45px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        #sub-info { font-size: 14px; color: #aaa; }

        /* Estil Bouton ak EditText */
        #wallet-container { margin-top: 20px; text-align: center; }
        
        .edittext-pro {
            background: #000;
            border: 2px solid #ffd700;
            color: #00ff00;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 15px;
            width: 220px;
            margin-bottom: 15px;
        }

        #main-btn {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: #000;
            transition: 0.2s;
        }

        #main-btn:active { transform: scale(0.9); }

        /* Pop up Mise */
        #bet-modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #000;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            width: 250px;
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="sky">
            <div id="multiplier-display">0.00 <div id="sub-info">SANTIM</div></div>
            <div id="airplane">✈️</div>
        </div>

        <div id="wallet-container">
            <div style="font-size: 12px; margin-bottom: 5px; color: #ffd700;">BALANS GOURDES</div>
            <input type="text" id="edittextGenyen" class="edittext-pro" value="0" readonly>
            <br>
            <button id="main-btn" onclick="handleButtonClick()">JWE (5 Goud)</button>
        </div>

        <div id="bet-modal">
            <h3>MISE 5 GOUD?</h3>
            <p>Sistèm nan pral retire 5 goud pou vòl sa.</p>
            <button onclick="startFlight()" style="background: #28a745; color: white; padding: 10px 25px; border-radius: 10px; border:none;">WI</button>
            <button onclick="closeModal()" style="background: #dc3545; color: white; padding: 10px 25px; border-radius: 10px; border:none;">NON</button>
        </div>
    </div>

    <script>
        let santimCounter = 0;
        let gameRunning = false;
        let crashLimit = 0;
        let flightInterval;
        let totalGourdes = 0;
        let consecutiveLosses = 0; // Pou swiv konbyen fwa li pèdi
        
        const multiplierDisplay = document.getElementById('multiplier-display');
        const mainBtn = document.getElementById('main-btn');
        const edittextGenyen = document.getElementById('edittextGenyen');
        const airplane = document.getElementById('airplane');
        const modal = document.getElementById('bet-modal');
        const sky = document.getElementById('sky');

        function handleButtonClick() {
            if (!gameRunning) {
                modal.style.display = 'block';
            } else {
                cashOut();
            }
        }

        function closeModal() { modal.style.display = 'none'; }

        function startFlight() {
            closeModal();
            gameRunning = true;
            santimCounter = 0;
            
            // INTELLIGENCE LOGIC:
            // Si li pèdi plis pase 5 fwa, nou ba li yon chans pou l rive ant 15 a 50 Goud
            if (consecutiveLosses >= 5) {
                let bigWinGourdes = Math.floor(Math.random() * 35) + 15; 
                crashLimit = bigWinGourdes * 1000000;
                consecutiveLosses = 0; // Reyalize pèt yo apre bèl vòl la
            } else {
                // Sinon, vòl la ka pété nenpòt kote (Hasard)
                // Ka pété nan 2g, 4g, oswa menm 0.5g
                crashLimit = Math.floor(Math.random() * 8000000) + 200000;
            }

            mainBtn.innerText = "REKIPERE KASE";
            mainBtn.style.background = "red";
            mainBtn.style.color = "white";

            flightInterval = setInterval(() => {
                // Vitès kontè a ap monte
                santimCounter += Math.floor(Math.random() * 25000) + 10000;
                multiplierDisplay.innerHTML = santimCounter.toLocaleString() + '<div id="sub-info">SANTIM</div>';

                // Animasyon nwaj
                if(Math.random() > 0.8) createCloud();

                // Si li rive nan limit la, li pété
                if (santimCounter >= crashLimit) {
                    crash();
                }
            }, 60);
        }

        function crash() {
            clearInterval(flightInterval);
            gameRunning = false;
            consecutiveLosses++; // Ogmante pèt yo
            
            multiplierDisplay.style.color = "red";
            multiplierDisplay.innerHTML = "CRASH! 💥";
            airplane.innerText = "🔥";

            setTimeout(() => {
                resetUI();
            }, 2000);
        }

        function cashOut() {
            clearInterval(flightInterval);
            gameRunning = false;
            
            let won = Math.floor(santimCounter / 1000000);
            totalGourdes += won;
            
            // Si li genyen yon bagay, nou ka desann chans li pou pwochen fwa
            if (won > 0) consecutiveLosses = 0; 

            edittextGenyen.value = totalGourdes;
            resetUI();
        }

        function resetUI() {
            mainBtn.innerText = "JWE (5 Goud)";
            mainBtn.style.background = "linear-gradient(180deg, #ffd700, #ff8c00)";
            mainBtn.style.color = "black";
            airplane.innerText = "✈️";
            multiplierDisplay.style.color = "#ffd700";
        }

        function createCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = (Math.random() * 60 + 20) + 'px';
            c.style.height = '15px';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '-20px';
            c.style.animationDuration = (Math.random() * 2 + 1) + 's';
            sky.appendChild(c);
            setTimeout(() => c.remove(), 2500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Secret Logic</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 350px;
            height: 500px;
            background: #000;
            border: 3px solid #ffd700;
            border-radius: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
        }

        #sky {
            width: 100%;
            height: 280px;
            background: linear-gradient(to bottom, #001, #003);
            position: relative;
            border-radius: 27px 27px 0 0;
            overflow: hidden;
        }

        #multiplier {
            font-size: 55px;
            font-weight: 900;
            color: #ffd700;
            text-align: center;
            width: 100%;
            margin-top: 40px;
            z-index: 5;
            position: relative;
        }

        #airplane {
            font-size: 60px;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* Panel pou Jwè a - Li klè epi li senp */
        #ui-player {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .display-box {
            background: #111;
            border: 2px solid #ffd700;
            width: 80%;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
        }

        .label { font-size: 10px; color: #ffd700; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 24px; color: #fff; font-weight: bold; }

        #main-btn {
            background: #ffd700;
            color: #000;
            border: none;
            width: 85%;
            padding: 18px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }

        #main-btn:active { transform: scale(0.95); }

        /* Nwaj */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            height: 15px;
            border-radius: 20px;
            animation: flow linear infinite;
        }
        @keyframes flow { from { top: -20px; } to { top: 300px; } }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="sky">
            <div id="multiplier">0.00</div>
            <div id="airplane">✈️</div>
        </div>

        <div id="ui-player">
            <div class="display-box">
                <div class="label">MIZ OU</div>
                <div id="txtMiz" class="value">5 GOUD</div>
            </div>

            <div class="display-box">
                <div class="label">REKÒMPANS</div>
                <div id="txtGenyen" class="value">0.00 G</div>
            </div>

            <button id="main-btn" onclick="handleInput()">JWE</button>
        </div>
    </div>

    <script>
        // --- MEMWA ENTÈN (Sistèm nan sèl ki konnen sa) ---
        let memwaPeye = 0;
        let memwaGenyen = 0;
        let santimCounter = 0;
        let isRunning = false;
        let crashLimit = 0;
        let gameLoop;
        const GOURDE = 1000000;

        const btn = document.getElementById('main-btn');
        const displayMulti = document.getElementById('multiplier');
        const displayGenyen = document.getElementById('txtGenyen');
        const airplane = document.getElementById('airplane');

        function handleInput() {
            if (!isRunning) {
                prepareNewFlight();
            } else {
                cashOut();
            }
        }

        function prepareNewFlight() {
            // Chak fwa li rekòmanse, ekran an vin pwòp
            displayGenyen.innerText = "0.00 G";
            displayMulti.innerText = "0.00";
            displayMulti.style.color = "#ffd700";
            airplane.innerText = "✈️";
            
            // Sistèm nan pran 5 goud la an kachèt
            memwaPeye += 5;
            
            startFlight();
        }

        function startFlight() {
            isRunning = true;
            santimCounter = 0;

            // --- LOJIK SEKRE ---
            let balansSekre = memwaGenyen - memwaPeye;
            
            if (balansSekre <= -500) {
                // Rabè si l pèdi anpil: avyon an ka rive 100g rive 500g
                crashLimit = Math.floor((Math.random() * 400 + 100) * GOURDE);
            } else if (balansSekre <= -200) {
                // Chans mwayen: 50g rive 150g
                crashLimit = Math.floor((Math.random() * 100 + 50) * GOURDE);
            } else {
                // Lojik nòmal: pété ant 0.5g ak 80g
                crashLimit = Math.floor((Math.random() * 80) * GOURDE) + (0.2 * GOURDE);
            }

            btn.innerText = "REKIPERE";
            btn.style.background = "#ff4d4d";
            btn.style.color = "#fff";

            gameLoop = setInterval(() => {
                santimCounter += Math.floor(Math.random() * 15000) + 8000;
                let goudAktyel = (santimCounter / GOURDE).toFixed(2);
                displayMulti.innerText = goudAktyel;

                if (Math.random() > 0.8) createCloud();

                if (santimCounter >= crashLimit) {
                    crash();
                }
            }, 60);
        }

        function crash() {
            clearInterval(gameLoop);
            isRunning = false;
            displayMulti.innerText = "CRASH! 💥";
            displayMulti.style.color = "red";
            airplane.innerText = "🔥";
            
            setTimeout(() => {
                resetUI();
            }, 1500);
        }

        function cashOut() {
            clearInterval(gameLoop);
            isRunning = false;
            
            let wonAmount = Math.floor(santimCounter / GOURDE);
            memwaGenyen += wonAmount; // Sistèm nan mete l nan memwa li
            
            displayGenyen.innerText = wonAmount.toFixed(2) + " G";
            displayMulti.style.color = "#00ff00";
            
            setTimeout(() => {
                resetUI();
            }, 1000);
        }

        function resetUI() {
            btn.innerText = "JWE (5G)";
            btn.style.background = "#ffd700";
            btn.style.color = "#000";
            isRunning = false;
        }

        function createCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = (Math.random() * 50 + 20) + 'px';
            c.style.left = Math.random() * 100 + '%';
            c.style.animationDuration = '2s';
            document.getElementById('sky').appendChild(c);
            setTimeout(() => c.remove(), 2000);
        }
    </script>
</body>
</html>

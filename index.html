<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Flight Master</title>
    <style>
        body {
            background-color: #020205;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Sky Engine - Graphique Pro */
        #game-frame {
            width: 360px;
            height: 580px;
            background: linear-gradient(to bottom, #001f3f, #000);
            border-radius: 40px;
            border: 4px solid #ffd700;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            overflow: hidden;
        }

        #multiplier-box {
            position: absolute;
            top: 60px;
            width: 100%;
            text-align: center;
            z-index: 20;
        }

        #count { font-size: 45px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .unit { font-size: 15px; color: #fff; }

        #airplane {
            font-size: 60px;
            position: absolute;
            bottom: 40px;
            left: calc(50% - 30px);
            z-index: 15;
            transition: transform 0.1s;
        }

        .cloud {
            position: absolute;
            background: white;
            opacity: 0.2;
            border-radius: 50px;
            filter: blur(5px);
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(-50px); }
            to { transform: translateY(600px); }
        }

        /* Interface Inputs & Buttons */
        #ui-panel {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group { margin-bottom: 10px; text-align: center; }
        .input-group label { font-size: 11px; color: #ffd700; font-weight: bold; }

        .edittext-genyen, .edittext-peye {
            background: #000;
            border: 2px solid #ffd700;
            border-radius: 12px;
            color: #00ff00;
            font-size: 22px;
            text-align: center;
            padding: 8px;
            width: 240px;
            font-weight: bold;
        }

        .edittext-peye { color: #ff4d4d; border-color: #ff4d4d; }

        #main-action-btn {
            background: linear-gradient(180deg, #ffd700, #b8860b);
            color: black;
            border: none;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        #main-action-btn:active { transform: scale(0.9); }

        /* Modal dialogue */
        #modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            width: 260px;
        }
    </style>
</head>
<body>

    <div id="game-frame">
        <div id="multiplier-box">
            <div id="count">0</div>
            <div class="unit">SANTIM</div>
        </div>

        <div id="airplane">✈️</div>

        <div id="modal">
            <h2 style="margin:0">MISE: 5G</h2>
            <p>Èske w prè pou vòl sa a?</p>
            <button onclick="confirmFlight()" style="background:green; color:white; padding:10px 20px; border:none; border-radius:10px; cursor:pointer;">WI, ALE!</button>
            <button onclick="hideModal()" style="background:red; color:white; padding:10px 20px; border:none; border-radius:10px; cursor:pointer; margin-left:10px;">NON</button>
        </div>
    </div>

    <div id="ui-panel">
        <div class="input-group">
            <label>KREDI PEYE (MISES)</label><br>
            <input type="text" id="edittextPeye" class="edittext-peye" value="0" readonly>
        </div>

        <div class="input-group">
            <label>KREDI GENYEN (REKÒMPANS)</label><br>
            <input type="text" id="edittextGenyen" class="edittext-genyen" value="0" readonly>
        </div>

        <button id="main-action-btn" onclick="triggerAction()">KÒMANSE (5G)</button>
    </div>

    <script>
        let santim = 0;
        let gameActive = false;
        let crashPoint = 0;
        let flightLoop;
        let totalGenyen = 0;
        let totalPeye = 0;
        let lossStreak = 0; // Entèlijans pou konte pèt yo
        const GOURDE_UNIT = 1000000;
        const LIMIT_MAX = 100 * GOURDE_UNIT; // Limit 100 Goud pèsonn pa ka pase

        const countDisplay = document.getElementById('count');
        const btn = document.getElementById('main-action-btn');
        const airplane = document.getElementById('airplane');
        const genyenField = document.getElementById('edittextGenyen');
        const peyeField = document.getElementById('edittextPeye');
        const modal = document.getElementById('modal');
        const frame = document.getElementById('game-frame');

        function triggerAction() {
            if (!gameActive) {
                modal.style.display = 'block';
            } else {
                cashOut();
            }
        }

        function hideModal() { modal.style.display = 'none'; }

        function confirmFlight() {
            hideModal();
            totalPeye += 5;
            peyeField.value = totalPeye;
            startFlight();
        }

        function startFlight() {
            gameActive = true;
            santim = 0;
            
            // --- LOGIQUE INTELLIGENTE ---
            // Kalkile kote l ap pété
            if (lossStreak >= 6) {
                // Si l pèdi anpil, ba li yon chans "Big Win" ant 20 a 99 Goud
                let bigWin = (Math.random() * 79) + 20; 
                crashPoint = Math.floor(bigWin * GOURDE_UNIT);
            } else {
                // Sinon, fè l pété ba (ant 0.5g ak 10g) pou l ka pèdi
                crashPoint = Math.floor((Math.random() * 10) * GOURDE_UNIT) + 100000;
            }

            // Garanti ke li PA JANM pase 100 Goud
            if (crashPoint >= LIMIT_MAX) {
                crashPoint = LIMIT_MAX - 50000; 
            }

            btn.innerText = "REKIPERE!";
            btn.style.background = "red";
            btn.style.color = "white";

            flightLoop = setInterval(() => {
                // Vitès la akselere plis li monte
                let speed = 15000 + (santim / 100);
                santim += Math.floor(Math.random() * speed);
                
                countDisplay.innerText = santim.toLocaleString();
                
                // Animasyon nwaj
                if(Math.random() > 0.85) spawnCloud();

                // Lojik pété a
                if (santim >= crashPoint) {
                    explode();
                }
            }, 70);
        }

        function explode() {
            clearInterval(flightLoop);
            gameActive = false;
            lossStreak++; // Yon pèt anplis
            
            countDisplay.innerText = "BOOM! 💥";
            countDisplay.style.color = "red";
            airplane.innerText = "🔥";
            
            setTimeout(resetGame, 2000);
        }

        function cashOut() {
            clearInterval(flightLoop);
            gameActive = false;
            
            let won = Math.floor(santim / GOURDE_UNIT);
            if (won > 0) {
                totalGenyen += won;
                genyenField.value = totalGenyen;
                lossStreak = 0; // Li genyen, nou reset chans li
            }
            
            resetGame();
        }

        function resetGame() {
            btn.innerText = "KÒMANSE (5G)";
            btn.style.background = "linear-gradient(180deg, #ffd700, #b8860b)";
            btn.style.color = "black";
            countDisplay.style.color = "#ffd700";
            airplane.innerText = "✈️";
            gameActive = false;
        }

        function spawnCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = (Math.random() * 80 + 40) + 'px';
            c.style.height = '20px';
            c.style.left = Math.random() * 300 + 'px';
            c.style.top = '-30px';
            c.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            frame.appendChild(c);
            setTimeout(() => c.remove(), 2000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Booster Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: white; text-align: center; 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }

        /* --- STYLE DIALOGUE --- */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-card {
            width: 85%; background: #1a1a1a; border: 2px solid #ffd700;
            border-radius: 20px; padding: 25px; text-align: center;
        }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-m { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* --- GAME BOX --- */
        #game-box {
            width: 340px; height: 380px; background: radial-gradient(circle, #050505, #111);
            border: 3px solid #ffd700; border-radius: 35px;
            position: relative; overflow: hidden;
        }
        #santim-raw { font-size: 45px; font-weight: 900; color: #ffd700; margin-top: 50px; text-shadow: 0 0 15px #ffd700; }
        #goud-converted { font-size: 18px; color: #fff; opacity: 0.7; margin-top: 5px; }
        #airplane { font-size: 60px; position: absolute; bottom: 40px; left: 40%; transition: 0.1s; }

        /* --- UI PANEL --- */
        #ui-panel { width: 340px; margin-top: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .field { background: #111; border: 1px solid #333; padding: 10px; border-radius: 15px; text-align: left; }
        label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; font-weight: bold; }
        .edittext { font-size: 24px; font-weight: bold; color: #00ff00; background: none; border: none; width: 100%; outline: none; }

        #draw-btn {
            width: 100%; background: linear-gradient(#ffd700, #ff8c00); color: #000;
            border: none; padding: 18px; border-radius: 50px; font-weight: bold;
            font-size: 20px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="santim-raw">0</div>
    <div id="goud-converted">0.00 GOUD</div>
    <div id="airplane">✈️</div>
</div>

<div id="ui-panel">
    <div class="grid-2">
        <div class="field">
            <label>Peye</label>
            <input type="text" id="edittextpeye" value="0" readonly class="edittext" style="color: #00ff00;">
        </div>
        <div class="field">
            <label>Genyen</label>
            <input type="text" id="edittextgenyen" value="0" readonly class="edittext" style="color: #ffcc00;">
        </div>
    </div>
    <button id="draw-btn">DEMARE AVYON</button>
</div>

<div id="modal">
    <div class="modal-card" id="modal-content"></div>
</div>

<script>
    const santimDisplay = document.getElementById("santim-raw");
    const goudDisplay = document.getElementById("goud-converted");
    const airplane = document.getElementById("airplane");
    const drawBtn = document.getElementById("draw-btn");
    const inputPeye = document.getElementById("edittextpeye");
    const inputGenyen = document.getElementById("edittextgenyen");
    const modal = document.getElementById("modal");
    const modalContent = document.getElementById("modal-content");

    let santimCounter = 0;
    let isRunning = false;
    let loop;
    let crashLimit = 0;
    let lastWin = false; 
    let consecutiveLosses = 0;
    const MILION = 1000000;

    // --- FONKSYON KOMINIKASYON ---
    function sendToSketchware(bwat, val) {
        if (window.Android && window.Android.voyeKòb) {
            window.Android.voyeKòb(bwat, val.toString());
        }
    }

    drawBtn.onclick = () => {
        if (isRunning) {
            cashOut();
            return;
        }
        
        modal.style.display = "flex";
        modalContent.innerHTML = `
            <h2 style="color:#ffd700">KONFIMASYON</h2>
            <p style="margin: 20px 0; font-size: 18px; color: #fff;">Vòl sa a koute <b>5 GOUD</b>. Èske w prè?</p>
            <div class="btn-row">
                <button class="btn-m" style="background:#444; color:#fff" onclick="modal.style.display='none'">NON</button>
                <button class="btn-m" style="background:#ffd700; color:#000" onclick="confirmStart()">WI</button>
            </div>
        `;
    };

    function confirmStart() {
        modal.style.display = "none";
        isRunning = true;
        santimCounter = 0;
        
        // Peye 5 Goud
        inputPeye.value = "5";
        sendToSketchware("peye", "5");
        
        inputGenyen.value = "0";
        sendToSketchware("genyen", "0");

        // Lojik Kazino (Booster)
        if (lastWin) {
            crashLimit = Math.floor((Math.random() * 0.7 + 0.2) * MILION);
        } else if (consecutiveLosses >= 5) {
            crashLimit = Math.floor((Math.random() * 4 + 6) * MILION);
        } else {
            crashLimit = Math.floor((Math.random() * 1.5 + 1.1) * MILION);
        }

        drawBtn.innerText = "REKIPERE KÒB!";
        drawBtn.style.background = "linear-gradient(#f00, #900)";
        drawBtn.style.color = "#fff";
        airplane.innerText = "✈️";

        loop = setInterval(() => {
            santimCounter += Math.floor(Math.random() * 80000) + 30000;
            santimDisplay.innerText = santimCounter.toLocaleString();
            goudDisplay.innerText = (santimCounter / MILION).toFixed(2) + " GOUD";

            if (santimCounter >= crashLimit) crash();
        }, 80);
    }

    function crash() {
        clearInterval(loop);
        isRunning = false;
        lastWin = false;
        consecutiveLosses++;
        
        santimDisplay.innerText = "BOOM! 💥";
        airplane.innerText = "🔥";
        sendToSketchware("genyen", "0");
        
        setTimeout(resetGame, 2000);
    }

    function cashOut() {
        clearInterval(loop);
        isRunning = false;
        
        let won = Math.floor(santimCounter / MILION);
        if (won > 0) {
            lastWin = true;
            consecutiveLosses = 0;
            inputGenyen.value = won.toString();
            sendToSketchware("genyen", won.toString());
            
            modal.style.display = "flex";
            modalContent.innerHTML = `
                <h2 style="color:#0f0">BRAVO!</h2>
                <h1 style="font-size:40px; color:#fff;">${won} GOUD</h1>
                <button class="btn-m" style="background:#ffd700; color:#000; margin-top:15px;" onclick="modal.style.display='none'">OK</button>
            `;
        }
        resetGame();
    }

    function resetGame() {
        drawBtn.innerText = "DEMARE AVYON";
        drawBtn.style.background = "linear-gradient(#ffd700, #ff8c00)";
        drawBtn.style.color = "#000";
        airplane.innerText = "✈️";
        isRunning = false;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Pro Flight - 1M Logic</title>
    <style>
        body {
            background-color: #050505; color: white;
            font-family: 'Trebuchet MS', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #game-box {
            width: 360px; height: 550px;
            background: linear-gradient(to bottom, #111, #222);
            border: 3px solid #ffd700; border-radius: 40px;
            position: relative; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex; flex-direction: column; align-items: center;
        }

        #sky {
            width: 100%; height: 300px;
            background: #000814; position: relative;
            overflow: hidden; border-radius: 35px 35px 0 0;
        }

        #multiplier-display {
            position: absolute; top: 50px; width: 100%; text-align: center;
            z-index: 20;
        }

        #santim-raw {
            font-size: 45px; font-weight: 900; color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        #goud-converted {
            font-size: 18px; color: #fff; background: rgba(0,0,0,0.5);
            padding: 5px 15px; border-radius: 20px; display: inline-block; margin-top: 5px;
        }

        #airplane {
            font-size: 50px; position: absolute;
            bottom: 40px; left: calc(50% - 25px); z-index: 10;
        }

        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.1);
            border-radius: 50px; animation: moveClouds linear infinite;
        }
        @keyframes moveClouds { from { transform: translateY(-50px); } to { transform: translateY(350px); } }

        #wallet-container { margin-top: 20px; text-align: center; }
        
        .edittext-pro {
            background: #000; border: 2px solid #ffd700; color: #00ff00;
            font-size: 24px; font-weight: bold; text-align: center;
            padding: 10px; border-radius: 15px; width: 220px; margin-bottom: 15px;
        }

        #main-btn {
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border: none; padding: 18px 50px; font-size: 22px;
            font-weight: bold; border-radius: 50px; cursor: pointer; color: #000;
        }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="sky">
            <div id="multiplier-display">
                <div id="santim-raw">0</div>
                <div id="goud-converted">0.00 GOUD</div>
            </div>
            <div id="airplane">✈️</div>
        </div>

        <div id="wallet-container">
            <div style="font-size: 11px; margin-bottom: 5px; color: #ffd700;">VALÈ REKIPERE</div>
            <input type="text" id="edittextGenyen" class="edittext-pro" value="0.00 G" readonly>
            <br>
            <button id="main-btn" onclick="handleButtonClick()">JWE (5 GOUD)</button>
        </div>
    </div>

    <script>
        let internalPeye = 0;
        let internalGenyen = 0;
        let santimCounter = 0;
        let gameRunning = false;
        let crashLimit = 0;
        let flightInterval;
        
        const MILION = 1000000; 

        const santimDisplay = document.getElementById('santim-raw');
        const goudDisplay = document.getElementById('goud-converted');
        const mainBtn = document.getElementById('main-btn');
        const edittextGenyen = document.getElementById('edittextGenyen');
        const airplane = document.getElementById('airplane');

        function handleButtonClick() {
            if (!gameRunning) startFlight();
            else cashOut();
        }

        function startFlight() {
            gameRunning = true;
            santimCounter = 0;
            
            // Reset Vizyèl
            santimDisplay.innerText = "0";
            santimDisplay.style.color = "#ffd700";
            goudDisplay.innerText = "0.00 GOUD";
            edittextGenyen.value = "0.00 G";
            airplane.innerText = "✈️";

            // Lojik Entèn
            internalPeye += 5;
            let balans = internalGenyen - internalPeye;

            // Kalkil Crash (An milyon santim)
            if (balans <= -500) {
                crashLimit = Math.floor((Math.random() * 300 + 200) * MILION); // 200G a 500G
            } else if (balans <= -200) {
                crashLimit = Math.floor((Math.random() * 100 + 50) * MILION); // 50G a 150G
            } else {
                // Nòmal: pété ant 1.5G ak 80G
                crashLimit = Math.floor((Math.random() * 78.5 + 1.5) * MILION);
            }

            mainBtn.innerText = "REKIPERE!";
            mainBtn.style.background = "red";
            mainBtn.style.color = "white";

            flightInterval = setInterval(() => {
                // Fè santim yo kouri vit pou rive nan milyon
                let jump = Math.floor(Math.random() * 80000) + 30000;
                santimCounter += jump;
                
                // Montre santim yo k ap ogmante
                santimDisplay.innerText = santimCounter.toLocaleString();
                
                // Montre konvèsyon an Goud an tan reyèl
                let valGoud = (santimCounter / MILION).toFixed(2);
                goudDisplay.innerText = valGoud + " GOUD";

                if (Math.random() > 0.8) createCloud();
                if (santimCounter >= crashLimit) crash();
            }, 80);
        }

        function crash() {
            clearInterval(flightInterval);
            gameRunning = false;
            santimDisplay.style.color = "#ff4d4d";
            santimDisplay.innerText = "BOOM! 💥";
            airplane.innerText = "🔥";
            setTimeout(resetUI, 2000);
        }

        function cashOut() {
            clearInterval(flightInterval);
            gameRunning = false;
            let wonVal = (santimCounter / MILION).toFixed(2);
            internalGenyen += Math.floor(santimCounter / MILION);
            edittextGenyen.value = wonVal + " G";
            santimDisplay.style.color = "#00ff00";
            setTimeout(resetUI, 1500);
        }

        function resetUI() {
            mainBtn.innerText = "JWE (5 GOUD)";
            mainBtn.style.background = "linear-gradient(180deg, #ffd700, #ff8c00)";
            mainBtn.style.color = "black";
            airplane.innerText = "✈️";
            gameRunning = false;
        }

        function createCloud() {
            const c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = '40px'; c.style.height = '12px';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '-20px';
            c.style.animationDuration = '1.5s';
            document.getElementById('sky').appendChild(c);
            setTimeout(() => c.remove(), 1600);
        }
    </script>
</body>
</html>
